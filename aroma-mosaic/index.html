  <script>
    (function() {
      var urls = [
        "https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js",
        "https://unpkg.com/echarts@5.5.0/dist/echarts.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"
      ];
      var idx = 0;
      function tryLoad() {
        if (idx >= urls.length) {
          document.body.innerHTML = '<div style="color:#ff6b6b;padding:40px;text-align:center;font-size:16px;">⚠️ グラフライブラリの読み込みに失敗しました。<br>インターネット接続を確認してページを再読み込みしてください。</div>';
          return;
        }
        var s = document.createElement('script');
        s.src = urls[idx++];
        s.onerror = tryLoad;
        document.head.appendChild(s);
      }
      tryLoad();
    })();
  </script>

    :root { --bg: #0b0c10; --panel: #1f2833; --text: #e9ecf1; --accent: #c5a880; }

    #base-screen { display: flex; flex-direction: column; align-items: center; padding-top: 20px; padding-bottom: 100px; width: 100%; }
    
    /* --- タブ切り替えボタンのスタイル --- */
    .view-tabs { display: flex; gap: 15px; margin-bottom: 20px; }
    .view-tab { padding: 10px 24px; border-radius: 30px; background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 0.05em; }
    .view-tab.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(197, 168, 128, 0.4); border-color: var(--accent); }

    /* --- 表示エリアの制御 --- */
    .view-section { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.3s ease-in-out; }
    .view-section.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- グラフコンテナのスタイル --- */
/* --- グラフコンテナのスタイル --- */
    .chart-box { width: 90%; max-width: 450px; aspect-ratio: 1/1; margin-bottom: 20px; border-radius: 16px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; }
    /* ↓ ツリーマップ用の縦長サイズを大幅に拡大！ */
    .chart-box.large { max-width: 800px; width: 95%; height: 70vh; min-height: 500px; aspect-ratio: unset; }
    
    #radar-chart, #sunburst-chart, #tree-chart { width: 100%; height: 100%; }

    /* --- 検索フローティングボタン --- */
    .fab-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1100; display: flex; align-items: center; gap: 12px; }
    .fab-search-btn { width: 52px; height: 52px; border-radius: 50%; background: rgba(31,40,51,0.95); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-size: 20px; cursor: pointer; box-shadow: 0 0 16px rgba(0,0,0,0.5); flex-shrink: 0; transition: background 0.2s; }
    .fab-search-btn.active { background: var(--accent); color: #000; }

    /* --- 検索オーバーレイ --- */
    #search-overlay { position: fixed; inset: 0; z-index: 1050; display: none; flex-direction: column; background: rgba(11,12,16,0.97); backdrop-filter: blur(20px); }
    #search-overlay.active { display: flex; }
    #search-bar-row { display: flex; align-items: center; gap: 10px; padding: 52px 15px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
    #aroma-search { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; color: #fff; padding: 11px 18px; font-size: 15px; outline: none; transition: border-color 0.2s; }
    #aroma-search:focus { border-color: var(--accent); }
    #aroma-search::placeholder { color: rgba(255,255,255,0.3); }
    #search-close-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    #search-results { flex: 1; overflow-y: auto; padding: 12px 15px 120px; }
    /* 検索ヒット行 */
    .search-hit { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; }
    .search-hit-info { flex: 1; min-width: 0; }
    .search-hit-name { font-size: 14px; font-weight: 800; }
    .search-hit-sub { font-size: 11px; color: #777; margin-top: 2px; }
    .search-hit-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 10px; }
    .search-score-dots { display: flex; gap: 3px; }
    .search-score-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
    .search-minus { width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .search-plus  { width: 30px; height: 30px; border-radius: 50%; color: #000; font-size: 18px; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .search-empty { text-align: center; color: rgba(233,236,241,0.3); padding: 80px 0; font-size: 13px; line-height: 2; }
    /* --- モーダル・ボタン類 --- */
    .fab-btn { background: var(--accent); color: #000; font-weight: 900; padding: 16px 40px; border-radius: 30px; border: none; cursor: pointer; box-shadow: 0 0 20px rgba(197, 168, 128, 0.4); letter-spacing: 0.1em; }

    .header-btns { display: flex; gap: 8px; }
    .close-btn { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }

    .swipe-wrapper { position: relative; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .nav-arrow { position: absolute; top: 6px; width: 44px; height: 44px; background: rgba(255,255,255,0.1); border-radius: 50%; color: white; z-index: 60; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    .arrow-left { left: 10px; }
    .arrow-right { right: 10px; }

    .btn { position: relative; overflow: hidden; border-radius: 12px; background: rgba(45, 55, 70, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; min-height: 85px; cursor: pointer; }

    // --- メインUI生成 ---
function initUI() {
  const tabsDiv = document.getElementById('modal-tabs');
  const swipeDiv = document.getElementById('swipe-container');
  const categories = Object.keys(catConfig);

  tabsDiv.innerHTML = '';
  swipeDiv.innerHTML = '';

  categories.forEach((catKey, index) => {
    const color = catConfig[catKey].hex;
    const isActive = index === window.currentPageIndex;

    // タブ
    const tab = document.createElement('div');
    tab.className = `tab ${isActive ? 'active' : ''}`;
    tab.innerText = (currentLang === 'ja') ? catConfig[catKey].jp : catConfig[catKey].en;
    if (isActive) {
      tab.style.backgroundColor = color;
      tab.style.color = '#000';
    }
    tab.onclick = () => {
      window.currentPageIndex = index;
      swipeDiv.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' });
      initUI();
    };
    tabsDiv.appendChild(tab);

    // ページ
    const page = document.createElement('div');
    page.className = 'swipe-page';

    const displayTitle = (currentLang === 'ja') ? catConfig[catKey].jp : catConfig[catKey].en;
    page.innerHTML = `<div class="category-title" style="color:${color}; border-bottom-color:${color};">${displayTitle}</div>`;

    const grid = document.createElement('div');
    grid.className = 'grid';

    // Uniqueフィルタ（role対応）
    const visibleItems = (flavorData[catKey] || []).filter(item => {
      const role = (item.role || 'main').toLowerCase();
      if (showUnique) return true;      // ON: main + unique
      return role !== 'unique';         // OFF: uniqueを隠す
    });

    visibleItems.forEach(item => {
      const dataId = `${catKey}_${item.en}`;
      const currentScore = selectedScores[dataId] || 0;
      const parts = (item.key || '').split('｜');

      const btn = document.createElement('div');
      btn.className = 'btn';

      const mainText = (currentLang === 'ja') ? item.jp : item.en;
      const subText  = (currentLang === 'ja') ? item.en : item.jp;

      btn.innerHTML = `
        <div class="fill-bg" style="height:${(currentScore/5)*100}%; background:${color};"></div>
        <div class="btn-content">
          <div class="btn-main normal-view">${mainText}</div>
          <div class="btn-sub normal-view">${subText}</div>
          <div class="btn-main expert-view">${parts[1] || ''}</div>
          <div class="btn-sub expert-view">${parts[0] || ''}</div>
          <div class="tag-sense" style="border-color:${currentScore>0?'#fff':'transparent'}">${parts[2] || ''}</div>
        </div>

    function renderSearchResults(query) {
      const container = document.getElementById('search-results');

      if (!q) {
        container.innerHTML = '<div class="search-empty">🔍<br>アロマ名を入力してください<br><span style="font-size:11px;">日本語・英語どちらでも検索できます</span></div>';
        return;
      }

      // ひらがな↔カタカナ両方にマッチさせる変換
      function toHira(str) { return str.replace(/[\u30A1-\u30F6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60)); }
      function toKata(str) { return str.replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60)); }
      function matches(text, q) {
        const t = text.toLowerCase();
        return t.includes(q) || toHira(t).includes(q) || toKata(t).includes(toKata(q));
      }

      // 全カテゴリ混在で収集
      const hits = [];
      Object.keys(catConfig).forEach(catKey => {
        (flavorData[catKey] || []).forEach(item => {
          if (!showUnique && (item.role||'main').toLowerCase() === 'unique') return;
          if (matches(item.jp, q) || matches(item.en, q)) {
            hits.push({ catKey, item });
          }
        });
      });

      if (hits.length === 0) {
        container.innerHTML = `<div class="search-empty">「${query}」に一致するアロマが見つかりません</div>`;
        return;

      hits.forEach(({ catKey, item }) => {

        const ctrl = document.createElement('div');

    // ===== 分子モデル描画エンジン =====
    const subMap = {"₀":"0","₁":"1","₂":"2","₃":"3","₄":"4","₅":"5","₆":"6","₇":"7","₈":"8","₉":"9"};
    const MOL_CAT_ANGLE = { cereal:0, fruity:30, citrus:60, floral:90, herbal:120, woody:150, smoky:180, spicy:210, sweet:240, winey:270, nutty:300, sulfury:330 };

    function normalizeFormula(raw) {
      if(!raw) return "";
      return raw.trim().replace(/[₀₁₂₃₄₅₆₇₈₉]/g, ch => subMap[ch] ?? ch).replace(/\s+/g,"");
    }
    function hexToRgb(hex){ const h=hex.replace("#",""); const n=parseInt(h,16); return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }
    function rgba(hex,a){ const{r,g,b}=hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }
    function darken(hex,amt=0.22){ const{r,g,b}=hexToRgb(hex); return `rgb(${Math.max(0,Math.floor(r*(1-amt)))},${Math.max(0,Math.floor(g*(1-amt)))},${Math.max(0,Math.floor(b*(1-amt)))})`; }

    function parseFormula(raw){
      const norm = normalizeFormula(raw||""); if(!norm) return{ok:false};
      let s = norm, polymer=false;
      const pm = s.match(/^\((.+)\)n$/i); if(pm){polymer=true;s=pm[1];}
      const re=/([A-Z][a-z]?)(\d*)/g; let m, counts={};
      while((m=re.exec(s))!==null){ const el=m[1],n=m[2]===""?1:Number(m[2]); counts[el]=(counts[el]??0)+n; }
      const C=counts["C"]??0, O=counts["O"]??0, N=counts["N"]??0, S=counts["S"]??0;
      return{ok:true,original:raw.trim(),norm:s,polymer,inorganic:(C===0),counts,C,O,N,S};
    }
    function carbonToVertices(C){ if(C<=3)return 3;if(C<=5)return 4;if(C===6)return 5;if(C<=8)return 6;if(C<=10)return 7;if(C<=13)return 8;if(C<=16)return 9;return 10; }
    function polygonPoints(cx,cy,r,n,rotDeg){ const pts=[],rot=rotDeg*Math.PI/180; for(let i=0;i<n;i++){const a=rot+i*(2*Math.PI/n);pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);} return pts; }
    function pickSpikeIdx(pts,cx,cy,targetDeg){ let best=Infinity,idx=0; pts.forEach((p,i)=>{const dx=p[0]-cx,dy=p[1]-cy,ang=Math.atan2(dy,dx)*180/Math.PI; let d=Math.abs((((ang-targetDeg)%360)+540)%360-180); if(d<best){best=d;idx=i;}}); return idx; }

    function buildMolSVG(formulaRaw, catKey, hex, size=56){
      const m = parseFormula(formulaRaw);
      if(!m.ok) return `<svg viewBox="0 0 ${size} ${size}"></svg>`;
      const cx=size/2, cy=size/2, baseR=size*0.3;
      const baseAngle = MOL_CAT_ANGLE[catKey] ?? 0;
      const rotation = (m.inorganic ? -45 : -90) + baseAngle;
      const pts = polygonPoints(cx, cy, baseR, m.inorganic ? 4 : carbonToVertices(m.C), rotation);
      const targetAtan = (catKey==="sulfury") ? 90 : (baseAngle+90)%360;
      const sIdx = pickSpikeIdx(pts, cx, cy, targetAtan);
      let spikePath="";
      if(m.S>0){
        const v=pts[sIdx],dx=v[0]-cx,dy=v[1]-cy,len=Math.hypot(dx,dy)||1;
        const ex=v[0]+(dx/len)*8,ey=v[1]+(dy/len)*8;
        const l=pts[(sIdx-1+pts.length)%pts.length],r2=pts[(sIdx+1)%pts.length];
        spikePath=`<path d="M ${(v[0]+l[0])/2} ${(v[1]+l[1])/2} L ${ex} ${ey} L ${(v[0]+r2[0])/2} ${(v[1]+r2[1])/2} Z" fill="${rgba(hex,0.1)}" stroke="${darken(hex)}" stroke-width="1.2"/>`;
      }
      const rings = m.O<=0 ? "" : `<circle cx="${cx}" cy="${cy}" r="${size*0.13}" fill="none" stroke="${rgba(hex,0.5)}" stroke-width="1.1"/>`+(m.O>1?`<circle cx="${cx}" cy="${cy}" r="${size*0.2}" fill="none" stroke="${rgba(hex,0.3)}" stroke-width="1"/>`:"");
      return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
        <circle cx="${cx}" cy="${cy}" r="${size*0.36}" fill="${rgba(hex,0.06)}"/>
        ${spikePath}
        <polygon points="${pts.map(p=>p[0].toFixed(2)+","+p[1].toFixed(2)).join(" ")}" fill="${rgba(hex,0.18)}" stroke="${darken(hex)}" stroke-width="1.5" ${m.polymer?'stroke-dasharray="4 3"':""}/>
        ${rings}
        ${m.N>0?`<circle cx="${cx}" cy="${cy}" r="2.3" fill="${rgba(hex,0.9)}"/>`:""}
      </svg>`;
    }

function renderMoleculePanel(){
  const container = document.getElementById('molecule-grid-container');
  container.innerHTML = '';
  const categories = Object.keys(catConfig);
  let hasAny = false;

  categories.forEach(catKey => {
    const visibleItems = (flavorData[catKey] || []).filter(item => {
      const role = (item.role || 'main').toLowerCase();
      if (showUnique) return true;
      return role !== 'unique';
    });

    const catItems = visibleItems
      .map(item => {
        const score = selectedScores[catKey + "_" + item.en] || 0;
        return { item, score };
      })
      .filter(x => x.score > 0);

    if (catItems.length === 0) return;
    hasAny = true;

    const color = catConfig[catKey].hex;
    const label = currentLang === 'ja' ? catConfig[catKey].jp : catConfig[catKey].en;

  }
}

      radarChart = echarts.init(document.getElementById('radar-chart'));
      sunburstChart = echarts.init(document.getElementById('sunburst-chart'));
      treeChart = echarts.init(document.getElementById('tree-chart')); // ツリーマップの初期化
      initUI(); updateCharts();
    };

    window.onresize = () => { 
      radarChart.resize(); sunburstChart.resize(); treeChart.resize(); 
      document.getElementById('swipe-container').scrollTo({ left: window.currentPageIndex * window.innerWidth }); 
    };
  </script>
</body>
</html>
